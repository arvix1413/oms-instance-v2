name: Daily Patrol (OMS)

on:
  schedule:
    # 测试：13:45 台北时间（UTC 05:45）
    - cron: '45 5 * * *'
  workflow_dispatch:

jobs:
  patrol:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      PATROL_PROJECT_NAME: OMS
      OMS_FRONTEND_URL: http://43.160.199.226
      OMS_API_URL: http://43.160.199.226:3001
      OMS_PATROL_EMAIL: ${{ secrets.OMS_PATROL_EMAIL }}
      OMS_PATROL_PASSWORD: ${{ secrets.OMS_PATROL_PASSWORD }}
      TELEGRAM_PATROL_BOT_TOKEN: ${{ secrets.TELEGRAM_PATROL_BOT_TOKEN }}
      TELEGRAM_PATROL_CHAT_ID: ${{ secrets.TELEGRAM_PATROL_CHAT_ID }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run daily patrol
        run: node scripts/daily-patrol.mjs
