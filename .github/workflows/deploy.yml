name: Build & Deploy OMS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      DEPLOY_ENV: main
      TARGET_HOST: 43.160.199.226
      TARGET_PORT: ${{ secrets.OMS_PRD_SERVER_PORT || secrets.SERVER_PORT }}
      TARGET_USER: ${{ secrets.OMS_PRD_SERVER_USER || secrets.SERVER_USER }}
      TARGET_PASSWORD: ${{ secrets.OMS_PRD_SERVER_PASSWORD || secrets.SERVER_PASSWORD }}
      API_URL: http://43.160.199.226
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USER }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build & Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ secrets.DOCKER_HUB_USER }}/oms-backend:${{ env.DEPLOY_ENV }}

      - name: Build & Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ secrets.DOCKER_HUB_USER }}/oms-frontend:${{ env.DEPLOY_ENV }}
          build-args: |
            NEXT_PUBLIC_API_URL=${{ env.API_URL }}

      - name: Upload Compose File
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ env.TARGET_HOST }}
          username: ${{ env.TARGET_USER }}
          password: ${{ env.TARGET_PASSWORD }}
          port: ${{ env.TARGET_PORT }}
          source: "docker-compose.yml"
          target: "/opt/oms/"

      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ env.TARGET_HOST }}
          username: ${{ env.TARGET_USER }}
          password: ${{ env.TARGET_PASSWORD }}
          port: ${{ env.TARGET_PORT }}
          script: IMAGE_TAG=${{ env.DEPLOY_ENV }} /opt/oms/deploy.sh

      - name: Notify Telegram
        if: always()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DEPLOY_STATUS: ${{ job.status }}
          PROJECT_NAME: oms-instance-v2
          REPO: ${{ github.repository }}
          BRANCH: ${{ github.ref_name }}
          SERVER_HOST: ${{ env.TARGET_HOST }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -z "${TELEGRAM_BOT_TOKEN}" ] || [ -z "${TELEGRAM_CHAT_ID}" ]; then
            echo "Telegram notification skipped: missing bot token or chat id"
            exit 0
          fi

          if [ "${DEPLOY_STATUS}" = "success" ]; then
            STATUS_TEXT="部署成功"
          else
            STATUS_TEXT="部署失败"
          fi

          COMMIT_MESSAGE=$(git log -1 --pretty=%B | sed '/^[[:space:]]*$/d')

          MESSAGE=$(cat <<EOF
          [部署通知]

          项目:
          ${PROJECT_NAME}

          仓库:
          ${REPO}

          分支:
          ${BRANCH}

          部署服务器:
          ${SERVER_HOST}

          部署结果:
          ${STATUS_TEXT}

          提交内容:
          ${COMMIT_MESSAGE}

          运行详情:
          ${RUN_URL}
          EOF
          )

          curl -sS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            --data-urlencode "text=${MESSAGE}"
