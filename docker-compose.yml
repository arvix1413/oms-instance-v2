version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: oms-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql-data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "3306:3306"
    networks:
      - oms-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5

  oms-backend:
    image: ${DOCKER_HUB_USER:-arvix1413}/oms-backend:${IMAGE_TAG:-latest}
    container_name: oms-backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - JWT_SECRET=${JWT_SECRET}
      - NODE_ENV=production
      - PORT=3001
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_NAME=${MYSQL_DATABASE}
      - DB_USER=${MYSQL_USER}
      - DB_PASSWORD=${MYSQL_PASSWORD}
      - RESEND_API_KEY=${RESEND_API_KEY}
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - oms-network

  oms-frontend:
    image: ${DOCKER_HUB_USER:-arvix1413}/oms-frontend:${IMAGE_TAG:-latest}
    container_name: oms-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - oms-backend
    networks:
      - oms-network

volumes:
  mysql-data:

networks:
  oms-network:
    driver: bridge
